name: Post FB Reel

on:
  schedule:
    # Every ~20 minutes, 24/7. Off-the-hour minutes (:07/:27/:47) avoid
    # GitHub Actions cron's high-load slots at :00/:30 which often get
    # delayed or skipped. The scheduler module inside still decides if
    # a slot is actually due — extra ticks are cheap (exit in seconds).
    - cron: "7,27,47 * * * *"
  # External pinger fallback: cron-job.org / UptimeRobot can call the
  # GitHub API to dispatch this workflow every N minutes if GH cron
  # silently skips. workflow_dispatch is already wired below.
  repository_dispatch:
    types: [external-tick]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no actual posting)"
        type: boolean
        default: false
      force_post:
        description: "Force post NOW (bypass scheduler — for manual runs)"
        type: boolean
        default: true

permissions:
  contents: write   # needed to commit state/ back to the repo

concurrency:
  group: post-fb-reel
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      FB_PAGE_ID:      ${{ secrets.FB_PAGE_ID }}
      FB_PAGE_TOKEN:   ${{ secrets.FB_PAGE_TOKEN }}
      FB_API_VERSION:  ${{ vars.FB_API_VERSION || 'v21.0' }}
      DRIVE_FOLDER_ID:           ${{ secrets.DRIVE_FOLDER_ID }}
      DRIVE_ARCHIVE_FOLDER_ID:   ${{ secrets.DRIVE_ARCHIVE_FOLDER_ID }}
      DRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.DRIVE_SERVICE_ACCOUNT_JSON }}
      DRIVE_OAUTH_REFRESH_TOKEN: ${{ secrets.DRIVE_OAUTH_REFRESH_TOKEN }}
      DRIVE_OAUTH_CLIENT_ID:     ${{ secrets.DRIVE_OAUTH_CLIENT_ID }}
      DRIVE_OAUTH_CLIENT_SECRET: ${{ secrets.DRIVE_OAUTH_CLIENT_SECRET }}
      TIMEZONE:        ${{ vars.TIMEZONE || 'Asia/Dhaka' }}
      POSTS_PER_DAY_MIN: ${{ vars.POSTS_PER_DAY_MIN || '7' }}
      POSTS_PER_DAY_MAX: ${{ vars.POSTS_PER_DAY_MAX || '10' }}
      # Full 24h posting window for maximum humanization / unpredictability.
      # Slots are still randomized per day, with >=60min min gap enforced.
      WINDOW_START_HOUR: ${{ vars.WINDOW_START_HOUR || '0' }}
      WINDOW_END_HOUR:   ${{ vars.WINDOW_END_HOUR || '24' }}
      SLOT_TOLERANCE_MINUTES: ${{ vars.SLOT_TOLERANCE_MINUTES || '25' }}
      HASHTAGS_PER_POST_MIN: ${{ vars.HASHTAGS_PER_POST_MIN || '8' }}
      HASHTAGS_PER_POST_MAX: ${{ vars.HASHTAGS_PER_POST_MAX || '12' }}
      HASHTAGS_FILE: ${{ vars.HASHTAGS_FILE || 'hashtags.txt' }}
      TITLES_FILE: ${{ vars.TITLES_FILE || 'titles.txt' }}
      FILTER_STYLE:   ${{ vars.FILTER_STYLE || 'random' }}
      WATERMARK_TEXT: ${{ vars.WATERMARK_TEXT || 'Ethan Wilder' }}
      DRY_RUN: ${{ inputs.dry_run && 'true' || 'false' }}
      # FORCE_POST: skip scheduler & post immediately. Only set on manual runs.
      FORCE_POST: ${{ github.event_name == 'workflow_dispatch' && inputs.force_post && 'true' || 'false' }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Preflight (verify secrets + FB + Drive connectivity)
        run: python -m src.preflight

      - name: Run poster
        run: python -m src.main

      - name: Commit state changes
        if: always()
        run: |
          if [ -n "$(git status --porcelain state)" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add state
            git commit -m "chore(state): update posted/schedule [skip ci]"
            # Retry-friendly push (rebase if main moved)
            for i in 1 2 3; do
              git pull --rebase --autostash origin "${GITHUB_REF_NAME}" || true
              if git push origin HEAD:"${GITHUB_REF_NAME}"; then
                exit 0
              fi
              sleep 3
            done
            echo "Failed to push state after retries" >&2
            exit 1
          else
            echo "No state changes to commit."
          fi
